<!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Nillion Passkey PoC - Ed25519 + WebAuthn</title>
      <style>
          :root { --primary: #00ffcc; --bg: #0a0a0a; --card: #161616; --text: #ffffff; }
          body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 2rem; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); max-width: 500px; width: 100%; text-align: center; border: 1px solid #333; }
        h1 { color: var(--primary); margin-bottom: 0.5rem; }
        p { margin-bottom: 2rem; color: #aaa; }
                button { background: var(--primary); color: #000; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 1rem; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        .log { background: #000; padding: 1rem; border-radius: 6px; text-align: left; font-family: monospace; font-size: 0.8rem; height: 150px; overflow-y: auto; border: 1px solid #222; }
        .log .info { color: #00ffcc; }
        .log .error { color: #ff5555; }
            </style>
              </head>
              <body>
                  <div class="container">
                      <h1>Nillion PoC</h1>
                  <p>WebAuthn Architecture for Ed25519 Key Pairs</p>
                  <button id="btn-register">1. Register Passkey (ED25519)</button>
                  <button id="btn-authenticate">2. Authenticate & Sign Challenge</button>
                  <div class="log" id="log"><span class="info">[READY]</span> System Initialized.<br></div>
              </div>
              <script src="app.js"></script>
          </body>
          </html>
